name: rake

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - '**.adoc'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.adoc'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

jobs:
  rake:
    uses: metanorma/ci/.github/workflows/generic-rake.yml@main
